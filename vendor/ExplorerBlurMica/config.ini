[config]
; effect: 0=Blur(仅22H2前,开销大) 1=Acrylic(实时模糊,GPU开销) 2=Mica(Win11原生,合成器加速,零感知开销) 3=Blur(Clear) 4=MicaAlt
; 为了"不影响性能"，固定用 Mica = 2
effect=2
clearAddress=true
clearBarBg=true
clearWinUIBg=true
showLine=false

[light]
; 浅色模式背景混合色 RGBA（a 越小越透）
r=235
g=235
b=235
a=120

[dark]
; 深色模式背景混合色 RGBA
r=20
g=20
b=25
a=120
